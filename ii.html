<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نور الإيمان - القرآن الكريم</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#F5F0E6;
color:#1f3d2b;
}

header{
background:#2f5d3a;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
position:sticky;
top:0;
}

.container{
display:grid;
grid-template-columns:300px 1fr;
height:100vh;
}

.sidebar{
background:#fff;
overflow:auto;
border-left:2px solid #eee;
}

.surah{
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.surah:hover{
background:#eaf3ea;
}

.content{
padding:20px;
overflow:auto;
}

.ayah{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

h2{
color:#2f5d3a;
}

button{
padding:8px 12px;
background:#2f5d3a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px 0;
}
</style>
</head>

<body>

<header>📖 القرآن الكريم + التفسير + الصوت</header>

<div class="container">

<!-- السور -->
<div class="sidebar" id="surahList"></div>

<!-- المحتوى -->
<div class="content">
<h2 id="title">اختر سورة</h2>

<button onclick="playAudio()">🔊 تشغيل التلاوة</button>

<div id="ayahs"></div>

</div>

</div>

<script>

// 📖 كل السور
const surahs = [
"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
"الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
"الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
"نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
"التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
"الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
"القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"
];

const list = document.getElementById("surahList");

let currentAudioUrl = "";

// عرض السور
surahs.forEach((name,i)=>{
let div=document.createElement("div");
div.className="surah";
div.innerText=(i+1)+" - "+name;
div.onclick=()=>loadSurah(i+1,name);
list.appendChild(div);
});

// تحميل السورة
function loadSurah(num,name){

document.getElementById("title").innerText="📖 سورة "+name;
document.getElementById("ayahs").innerHTML="جاري التحميل...";

fetch(`https://api.alquran.cloud/v1/surah/${num}`)
.then(r=>r.json())
.then(data=>{

let ayahs=data.data.ayahs;

currentAudioUrl = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${num}.mp3`;

document.getElementById("ayahs").innerHTML="";

// عرض الآيات + تفسير
ayahs.forEach(a=>{

let box=document.createElement("div");
box.className="ayah";

box.innerHTML=`
<p><b>${a.text}</b></p>
<p style="opacity:0.7;font-size:14px" id="t${a.numberInSurah}">
جاري تحميل التفسير...
</p>
`;

document.getElementById("ayahs").appendChild(box);

// 📚 تفسير مبسط
fetch(`https://api.alquran.cloud/v1/ayah/${a.number}/editions/ar.muyassar`)
.then(res=>res.json())
.then(t=>{
document.getElementById("t"+a.numberInSurah).innerText =
"📚 التفسير: " + t.data[0].text;
});

});

});
}

// 🔊 تشغيل الصوت
function playAudio(){
if(currentAudioUrl){
let audio=new Audio(currentAudioUrl);
audio.play();
}
}

</script>

</body>
</html>
